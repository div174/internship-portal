{% extends 'base.html' %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100 text-center">
    <div>
        <h1 class="display-1 fw-bold text-primary">404</h1>
        <h3 class="mb-4">Oops! Page not found.</h3>
        <p class="text-muted mb-4">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="{% url 'index' %}" class="btn btn-primary rounded-pill px-4">Go to Homepage</a>
    </div>
</div>
{% endblock %}
