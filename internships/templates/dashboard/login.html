{% extends 'base.html' %}

{% block title %}Admin Login | Amaanitvam Dashboard{% endblock %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="row w-100 justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card border-0 shadow-lg rounded-4 glass-card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="icon-box bg-primary-soft text-primary mx-auto mb-3 rounded-circle d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                            <i class="fa-solid fa-shield-halved fa-2x"></i>
                        </div>
                        <h4 class="fw-bold outfit-font mb-1">Admin Portal</h4>
                        <p class="text-muted small">Sign in to manage applications</p>
                    </div>

                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0 bg-light" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0 bg-light" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold shadow-sm hover-lift">
                                Secure Login <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="{% url 'index' %}" class="text-muted small text-decoration-none"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
